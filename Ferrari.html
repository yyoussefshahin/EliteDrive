<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<title>Ferrari - High-End Cars</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-image: url(imgs/ferrari2.jpg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
        }

       
        .hero {
            position: relative;
            height: 60vh;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: #000;
        }

          .specs {
            font-size: 0.95rem;
            color: #fcfcfc;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .hero img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            text-align: center;
            color: #fff;
            padding: 20px;
        }

        h1 {
            font-style: italic;
            font-size: 4rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

       
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .card {
            background: #483a3a;
            border: 1px solid #ffffff;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #ddd;
        }

        .card-content {
            padding: 20px;
            text-align: center;
        }

        .car-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .price {
            font-size: 1.1rem;
            color: #ffffff;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            background-color: #e30613; 
            color: #fff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            .hero {
                height: 40vh;
            }
        }
    </style>
</head>


<body>
